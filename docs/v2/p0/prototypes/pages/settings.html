<div class="page-container">
  <div class="page-header">
    <h2 class="page-title">设置</h2>
  </div>

  <!-- Settings Navigation -->
  <div style="display: flex; gap: 24px;">
    <!-- Left Sidebar -->
    <div style="width: 200px; flex-shrink: 0;">
      <div class="sidebar-nav">
        <a href="#" class="nav-item active" data-section="accounts">Twitter 账号</a>
        <a href="#" class="nav-item" data-section="preferences">系统偏好</a>
      </div>
    </div>

    <!-- Right Content -->
    <div style="flex: 1;">
      <!-- Twitter Accounts Section -->
      <div id="section-accounts" class="settings-section">
        <h3 class="mb-lg">Twitter 账号管理</h3>
        <button id="map-account-btn" class="mb-lg">映射账号</button>

        <div id="accounts-grid" class="grid grid-2"></div>

        <div id="accounts-empty" class="empty-state hidden">
          <div class="empty-state-icon">👤</div>
          <div class="empty-state-title">暂无账号</div>
          <div class="empty-state-desc">点击"映射账号"按钮添加第一个账号</div>
        </div>
      </div>

      <!-- Workspace Section -->
      <div id="section-workspace" class="settings-section hidden">
        <!-- This section has been removed - workspace management is now only in the header -->
      </div>

      <!-- Preferences Section -->
      <div id="section-preferences" class="settings-section hidden">
        <h3 class="mb-lg">系统偏好</h3>

        <div class="card">
          <div class="form-group">
            <label class="form-label">语言</label>
            <select id="language-select">
              <option value="zh-CN">中文</option>
              <option value="en-US">English</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">主题</label>
            <select id="theme-select">
              <option value="light">浅色</option>
              <option value="dark">深色</option>
              <option value="system">跟随系统</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">启动时行为</label>
            <select id="startup-select">
              <option value="last-workspace">打开上次工作目录</option>
              <option value="show-selector">显示选择界面</option>
            </select>
          </div>

          <button id="save-preferences-btn">保存设置</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
window.init_settings = function() {
  // Section navigation
  document.querySelectorAll('.sidebar-nav .nav-item').forEach(item => {
    item.onclick = (e) => {
      e.preventDefault();
      const section = item.dataset.section;

      // Update active nav
      document.querySelectorAll('.sidebar-nav .nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');

      // Show section
      document.querySelectorAll('.settings-section').forEach(s => s.classList.add('hidden'));
      document.getElementById(`section-${section}`).classList.remove('hidden');
    };
  });

  // Render accounts
  function renderAccounts() {
    const accounts = accountManager.getAccounts();
    const grid = document.getElementById('accounts-grid');
    const empty = document.getElementById('accounts-empty');

    if (accounts.length === 0) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }

    empty.classList.add('hidden');
    grid.innerHTML = accounts.map(account => `
      <div class="account-card">
        <img src="${account.avatar}" alt="${account.displayName}" class="account-avatar">
        <div class="account-info">
          <div class="account-name">${account.displayName}</div>
          <div class="account-username">${account.screenName}</div>
          <div class="account-meta">
            <span class="status ${account.status}">${account.status === 'online' ? '在线' : account.status === 'offline' ? '离线' : '验证中'}</span>
            <span>${formatRelativeTime(account.lastVerified)}</span>
          </div>
        </div>
        <div class="account-actions">
          <button class="icon-btn refresh-account-btn" data-screen-name="${account.screenName}" title="刷新状态">🔄</button>
          ${account.status === 'offline' ? `<button class="small secondary reconnect-btn" data-screen-name="${account.screenName}">重新连接</button>` : ''}
          <button class="icon-btn danger delete-account-btn" data-screen-name="${account.screenName}" title="删除">×</button>
        </div>
      </div>
    `).join('');

    // Attach event listeners
    document.querySelectorAll('.refresh-account-btn').forEach(btn => {
      btn.onclick = () => accountManager.refreshAccountStatus(btn.dataset.screenName);
    });

    document.querySelectorAll('.reconnect-btn').forEach(btn => {
      btn.onclick = () => accountManager.reconnectAccount(btn.dataset.screenName);
    });

    document.querySelectorAll('.delete-account-btn').forEach(btn => {
      btn.onclick = () => accountManager.deleteAccount(btn.dataset.screenName);
    });
  }

  // Map account
  document.getElementById('map-account-btn').onclick = () => {
    accountManager.mapAccount();
  };

  // Preferences
  const preferences = Storage.getGlobal('preferences') || {
    language: 'zh-CN',
    theme: 'light',
    startup: 'last-workspace'
  };

  document.getElementById('language-select').value = preferences.language;
  document.getElementById('theme-select').value = preferences.theme;
  document.getElementById('startup-select').value = preferences.startup;

  document.getElementById('save-preferences-btn').onclick = () => {
    const newPreferences = {
      language: document.getElementById('language-select').value,
      theme: document.getElementById('theme-select').value,
      startup: document.getElementById('startup-select').value
    };

    Storage.setGlobal('preferences', newPreferences);
    showToast('设置已保存', 'success');

    // Apply theme (simple implementation)
    if (newPreferences.theme === 'dark') {
      document.body.style.filter = 'invert(1) hue-rotate(180deg)';
    } else {
      document.body.style.filter = 'none';
    }
  };

  // Listen for account changes
  window.addEventListener('accounts-changed', renderAccounts);

  // Initial render
  renderAccounts();
  renderRecentWorkspaces();
};
</script>

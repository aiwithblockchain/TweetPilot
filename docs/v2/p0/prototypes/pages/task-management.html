<div class="page-container">
  <div class="page-header">
    <h2 class="page-title">任务管理</h2>
    <button id="create-task-btn">创建任务</button>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">全部任务</button>
    <button class="filter-tab" data-filter="immediate">即时任务</button>
    <button class="filter-tab" data-filter="scheduled">定时任务</button>
    <button class="filter-tab" data-filter="failed">失败记录</button>
  </div>

  <!-- Task List -->
  <div id="task-list" class="grid grid-2"></div>

  <!-- Empty State -->
  <div id="empty-state" class="empty-state hidden">
    <div class="empty-state-icon">📋</div>
    <div class="empty-state-title">暂无任务</div>
    <div class="empty-state-desc">点击"创建任务"按钮添加第一个任务</div>
  </div>
</div>

<!-- Task Detail Sidebar -->
<div id="task-detail-sidebar" class="sidebar-panel">
  <div class="sidebar-panel-header">
    <h3>任务详情</h3>
    <button class="icon-btn" id="close-sidebar-btn">×</button>
  </div>
  <div class="sidebar-panel-content">
    <div class="tabs">
      <button class="tab active" data-tab="config">配置</button>
      <button class="tab" data-tab="stats">统计</button>
      <button class="tab" data-tab="history">历史</button>
    </div>

    <div id="tab-config" class="tab-content active"></div>
    <div id="tab-stats" class="tab-content"></div>
    <div id="tab-history" class="tab-content"></div>
  </div>
</div>

<script>
window.init_task_management = function() {
  let currentFilter = 'all';
  let selectedTaskId = null;

  // Render tasks
  function renderTasks() {
    const tasks = taskManager.getTasks(currentFilter);
    const taskList = document.getElementById('task-list');
    const emptyState = document.getElementById('empty-state');

    if (tasks.length === 0) {
      taskList.innerHTML = '';
      emptyState.classList.remove('hidden');
      return;
    }

    emptyState.classList.add('hidden');
    taskList.innerHTML = tasks.map(task => {
      if (task.type === 'immediate') {
        // 即时任务卡片
        const lastExec = task.lastExecution;
        return `
          <div class="task-card" data-task-id="${task.id}">
            <div class="task-card-header">
              <div>
                <div class="task-card-title">${task.name}</div>
                <div class="task-card-badges">
                  <span class="badge immediate">即时任务</span>
                  <span class="status ${task.status}">${task.status === 'running' ? '执行中' : '待执行'}</span>
                </div>
              </div>
            </div>
            <div class="task-card-meta">
              <div>描述：${task.description || '无'}</div>
              <div>脚本：${task.scriptPath}</div>
              ${lastExec ? `<div>最后执行：${formatRelativeTime(lastExec.startTime)} <span class="status ${lastExec.status}">${lastExec.status === 'success' ? '成功' : '失败'}</span></div>` : '<div>尚未执行</div>'}
            </div>
            <div class="task-card-actions">
              <button class="small secondary view-detail-btn">查看详情</button>
              <button class="small execute-btn" ${task.status === 'running' ? 'disabled' : ''}>立即执行</button>
              <button class="small danger delete-btn">删除</button>
            </div>
          </div>
        `;
      } else {
        // 定时任务卡片
        return `
          <div class="task-card" data-task-id="${task.id}">
            <div class="task-card-header">
              <div>
                <div class="task-card-title">${task.name}</div>
                <div class="task-card-badges">
                  <span class="badge scheduled">定时任务</span>
                  <span class="status ${task.status}">${task.status === 'running' ? '运行中' : '已暂停'}</span>
                </div>
              </div>
            </div>
            <div class="task-card-meta">
              <div>执行规则：${task.schedule}</div>
              ${task.nextExecutionTime ? `<div>下次执行：${formatRelativeTime(task.nextExecutionTime)}</div>` : ''}
              ${task.lastExecutionTime ? `<div>最后执行：${formatRelativeTime(task.lastExecutionTime)}</div>` : '<div>尚未执行</div>'}
              <div>成功率：${task.statistics.successRate}%</div>
            </div>
            <div class="task-card-actions">
              <button class="small secondary view-detail-btn">查看详情</button>
              ${task.status === 'running' ? '<button class="small secondary pause-btn">暂停</button>' : '<button class="small secondary resume-btn">恢复</button>'}
              <button class="small danger delete-btn">删除</button>
            </div>
          </div>
        `;
      }
    }).join('');

    // Attach event listeners
    document.querySelectorAll('.task-card').forEach(card => {
      const taskId = card.dataset.taskId;
      const task = taskManager.getTask(taskId);

      card.querySelector('.view-detail-btn').onclick = () => showTaskDetail(taskId);
      card.querySelector('.delete-btn').onclick = () => taskManager.deleteTask(taskId);

      const executeBtn = card.querySelector('.execute-btn');
      if (executeBtn) {
        executeBtn.onclick = () => taskManager.executeTask(taskId);
      }

      const pauseBtn = card.querySelector('.pause-btn');
      const resumeBtn = card.querySelector('.resume-btn');
      if (pauseBtn) pauseBtn.onclick = () => taskManager.pauseTask(taskId);
      if (resumeBtn) resumeBtn.onclick = () => taskManager.resumeTask(taskId);
    });
  }

  // Show task detail
  function showTaskDetail(taskId) {
    selectedTaskId = taskId;
    const task = taskManager.getTask(taskId);
    if (!task) return;

    const sidebar = document.getElementById('task-detail-sidebar');
    const tabsContainer = sidebar.querySelector('.tabs');
    const sidebarContent = sidebar.querySelector('.sidebar-panel-content');

    // Update sidebar tabs based on task type
    if (task.type === 'immediate') {
      // 即时任务：配置、最后执行、失败记录
      tabsContainer.innerHTML = `
        <button class="tab active" data-tab="config">配置</button>
        <button class="tab" data-tab="last-execution">最后执行</button>
        <button class="tab" data-tab="failures">失败记录</button>
      `;

      // Remove old tab contents
      sidebarContent.querySelectorAll('.tab-content').forEach(el => el.remove());

      // Add new tab contents using insertAdjacentHTML to avoid destroying DOM
      sidebarContent.insertAdjacentHTML('beforeend', `
        <div id="tab-config" class="tab-content active"></div>
        <div id="tab-last-execution" class="tab-content"></div>
        <div id="tab-failures" class="tab-content"></div>
      `);
    } else {
      // 定时任务：配置、统计、执行历史、失败记录
      tabsContainer.innerHTML = `
        <button class="tab active" data-tab="config">配置</button>
        <button class="tab" data-tab="stats">统计</button>
        <button class="tab" data-tab="history">执行历史</button>
        <button class="tab" data-tab="failures">失败记录</button>
      `;

      // Remove old tab contents
      sidebarContent.querySelectorAll('.tab-content').forEach(el => el.remove());

      // Add new tab contents using insertAdjacentHTML to avoid destroying DOM
      sidebarContent.insertAdjacentHTML('beforeend', `
        <div id="tab-config" class="tab-content active"></div>
        <div id="tab-stats" class="tab-content"></div>
        <div id="tab-history" class="tab-content"></div>
        <div id="tab-failures" class="tab-content"></div>
      `);
    }

    // Attach tab click handlers BEFORE opening sidebar
    tabsContainer.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        tabsContainer.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        sidebarContent.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
      };
    });

    sidebar.classList.add('open');

    // Render config tab
    renderConfigTab(task);

    if (task.type === 'immediate') {
      renderLastExecutionTab(task);
    } else {
      renderStatsTab(task);
      renderHistoryTab(task);
    }

    renderFailuresTab(task);
  }

  function renderConfigTab(task) {
    document.getElementById('tab-config').innerHTML = `
      <div class="form-group">
        <div class="form-label">任务名称</div>
        <div>${task.name}</div>
      </div>
      <div class="form-group">
        <div class="form-label">描述</div>
        <div>${task.description || '无'}</div>
      </div>
      <div class="form-group">
        <div class="form-label">脚本路径</div>
        <div class="text-small" style="font-family: monospace;">${task.scriptPath}</div>
      </div>
      <div class="form-group">
        <div class="form-label">任务类型</div>
        <div>${task.type === 'scheduled' ? '定时任务' : '即时任务'}</div>
      </div>
      ${task.schedule ? `
        <div class="form-group">
          <div class="form-label">执行规则</div>
          <div>${task.schedule}</div>
        </div>
      ` : ''}
      <div class="form-group">
        <div class="form-label">任务参数</div>
        <pre style="background: var(--color-bg-secondary); padding: 12px; border-radius: 4px; font-size: 12px;">${JSON.stringify(task.parameters, null, 2)}</pre>
      </div>
    `;
  }

  function renderLastExecutionTab(task) {
    const lastExec = task.lastExecution;
    const content = document.getElementById('tab-last-execution');

    if (!lastExec) {
      content.innerHTML = '<div class="empty-state"><div class="empty-state-title">尚未执行</div></div>';
      return;
    }

    content.innerHTML = `
      <div class="form-group">
        <div class="form-label">执行状态</div>
        <div class="status ${lastExec.status}">${lastExec.status === 'success' ? '成功' : '失败'}</div>
      </div>
      <div class="form-group">
        <div class="form-label">开始时间</div>
        <div>${formatDate(lastExec.startTime)}</div>
      </div>
      <div class="form-group">
        <div class="form-label">结束时间</div>
        <div>${formatDate(lastExec.endTime)}</div>
      </div>
      <div class="form-group">
        <div class="form-label">耗时</div>
        <div>${lastExec.duration.toFixed(2)} 秒</div>
      </div>
      ${lastExec.output ? `
        <div class="form-group">
          <div class="form-label">输出</div>
          <pre style="background: var(--color-bg-secondary); padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 12px;">${lastExec.output}</pre>
        </div>
      ` : ''}
      ${lastExec.error ? `
        <div class="form-group">
          <div class="form-label">错误信息</div>
          <pre style="background: #fee; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 12px; color: var(--color-danger);">${lastExec.error}</pre>
        </div>
      ` : ''}
    `;
  }

  function renderStatsTab(task) {
    document.getElementById('tab-stats').innerHTML = `
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value">${task.statistics.totalExecutions}</div>
          <div class="stat-label">总执行次数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${task.statistics.successCount}</div>
          <div class="stat-label">成功次数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${task.statistics.failureCount}</div>
          <div class="stat-label">失败次数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${task.statistics.successRate}%</div>
          <div class="stat-label">成功率</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${task.statistics.averageDuration}s</div>
          <div class="stat-label">平均时长</div>
        </div>
      </div>
    `;
  }

  function renderHistoryTab(task) {
    const history = taskManager.getExecutionHistory(task.id);
    const content = document.getElementById('tab-history');

    if (history.length === 0) {
      content.innerHTML = '<div class="empty-state"><div class="empty-state-title">暂无执行历史</div></div>';
      return;
    }

    content.innerHTML = `
      <div class="execution-list">
        ${history.map(exec => `
          <div class="execution-item ${exec.status}">
            <div class="execution-info">
              <div class="execution-time">${formatDate(exec.startTime)}</div>
              <div class="execution-duration">${exec.duration.toFixed(1)}s</div>
            </div>
            <div class="status ${exec.status}">${exec.status === 'success' ? '成功' : '失败'}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function renderFailuresTab(task) {
    const failures = taskManager.getFailureLog(task.id);
    const content = document.getElementById('tab-failures');

    if (failures.length === 0) {
      content.innerHTML = '<div class="empty-state"><div class="empty-state-title">暂无失败记录</div></div>';
      return;
    }

    content.innerHTML = `
      <div class="execution-list">
        ${failures.map(exec => `
          <div class="execution-item failure">
            <div class="execution-info">
              <div class="execution-time">${formatDate(exec.startTime)}</div>
              <div class="execution-duration">${exec.duration.toFixed(1)}s</div>
            </div>
            <div style="margin-top: 8px;">
              ${exec.error ? `<pre style="background: #fee; padding: 8px; border-radius: 4px; font-size: 11px; color: var(--color-danger); margin: 0;">${exec.error}</pre>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  // Create task
  document.getElementById('create-task-btn').onclick = () => {
    const content = document.createElement('div');
    content.innerHTML = `
      <div class="form-group">
        <label class="form-label">任务名称 *</label>
        <input type="text" id="task-name" placeholder="例如：每日推文发布">
      </div>
      <div class="form-group">
        <label class="form-label">任务描述</label>
        <textarea id="task-desc" rows="3" placeholder="描述任务的用途"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Python 脚本 *</label>
        <div style="display: flex; gap: 8px; margin-bottom: 8px;">
          <input type="text" id="task-script" placeholder="例如：scripts/daily-tweet.py" style="flex: 1;">
          <button type="button" class="secondary small" id="browse-script-btn">浏览</button>
        </div>
        <div class="form-help">点击"浏览"选择文件，或直接输入相对路径</div>
      </div>
      <div class="form-group">
        <label class="form-label">任务类型 *</label>
        <select id="task-type">
          <option value="scheduled">定时任务</option>
          <option value="immediate">即时任务</option>
        </select>
      </div>
      <div class="form-group" id="schedule-group">
        <label class="form-label">执行规则 *</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
          <div>
            <label class="form-label" style="font-size: 12px; margin-bottom: 4px;">间隔数值</label>
            <input type="number" id="schedule-value" min="1" value="60" style="width: 100%;">
          </div>
          <div>
            <label class="form-label" style="font-size: 12px; margin-bottom: 4px;">时间单位</label>
            <select id="schedule-unit" style="width: 100%;">
              <option value="minutes">分钟</option>
              <option value="hours">小时</option>
              <option value="days">天</option>
            </select>
          </div>
        </div>
        <div class="form-help">任务将按照设定的时间间隔自动执行</div>
      </div>
      <div class="form-actions">
        <button class="secondary" onclick="this.closest('.modal-overlay').remove()">取消</button>
        <button id="create-task-submit">创建</button>
      </div>
    `;

    const modal = showModal(content, '创建任务');

    // Browse script button
    content.querySelector('#browse-script-btn').onclick = () => {
      // 模拟文件选择对话框
      const mockFiles = [
        'scripts/daily-tweet.py',
        'scripts/data-scraper.py',
        'scripts/interaction-stats.py',
        'scripts/auto-reply.py',
        'scripts/content-generator.py'
      ];

      const fileList = document.createElement('div');
      fileList.innerHTML = `
        <p class="mb-md text-secondary">选择 Python 脚本文件：</p>
        <div style="max-height: 300px; overflow-y: auto;">
          ${mockFiles.map(file => `
            <div class="card mb-sm" style="cursor: pointer; padding: 12px;" data-file="${file}">
              <div style="font-family: monospace; font-size: 14px;">${file}</div>
            </div>
          `).join('')}
        </div>
        <div class="form-help mt-md">在实际应用中，这里会打开系统文件选择对话框</div>
      `;

      const fileModal = showModal(fileList, '选择脚本文件');

      fileList.querySelectorAll('.card').forEach(card => {
        card.onmouseover = () => card.style.borderColor = 'var(--color-primary)';
        card.onmouseout = () => card.style.borderColor = 'var(--color-border)';
        card.onclick = () => {
          content.querySelector('#task-script').value = card.dataset.file;
          fileModal.remove();
        };
      });
    };

    // Toggle schedule input
    content.querySelector('#task-type').onchange = (e) => {
      const scheduleGroup = content.querySelector('#schedule-group');
      scheduleGroup.style.display = e.target.value === 'scheduled' ? 'block' : 'none';
    };

    content.querySelector('#create-task-submit').onclick = async () => {
      console.log('=== Create Task Button Clicked ===');

      const name = content.querySelector('#task-name').value;
      const description = content.querySelector('#task-desc').value;
      const scriptPath = content.querySelector('#task-script').value;
      const type = content.querySelector('#task-type').value;

      console.log('Form values:', { name, description, scriptPath, type });

      let schedule = null;
      if (type === 'scheduled') {
        const scheduleValue = content.querySelector('#schedule-value').value;
        const scheduleUnit = content.querySelector('#schedule-unit').value;
        schedule = `every ${scheduleValue} ${scheduleUnit}`;
        console.log('Schedule:', schedule);
      }

      if (!name || !scriptPath) {
        console.log('Validation failed: missing required fields');
        showToast('请填写必填项', 'error');
        return;
      }

      if (type === 'scheduled' && (!content.querySelector('#schedule-value').value || content.querySelector('#schedule-value').value < 1)) {
        console.log('Validation failed: invalid schedule value');
        showToast('定时任务需要设置有效的执行规则', 'error');
        return;
      }

      console.log('Validation passed, closing modal');
      modal.remove();

      console.log('Creating task with:', { name, description, scriptPath, type, schedule });

      try {
        await taskManager.createTask({ name, description, scriptPath, type, schedule });
        console.log('Task created successfully, calling renderTasks()');
        renderTasks();
        console.log('renderTasks() called');
      } catch (error) {
        console.error('Error creating task:', error);
        showToast('创建任务失败: ' + error.message, 'error');
      }
    };
  };

  // Filter tabs
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderTasks();
    };
  });

  // Sidebar tabs
  document.querySelectorAll('.sidebar-panel .tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.sidebar-panel .tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.sidebar-panel .tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
    };
  });

  // Close sidebar
  document.getElementById('close-sidebar-btn').onclick = () => {
    document.getElementById('task-detail-sidebar').classList.remove('open');
  };

  // Listen for task changes
  window.addEventListener('tasks-changed', renderTasks);

  // Initial render
  renderTasks();
};
</script>

<div class="page-container">
  <div class="page-header">
    <h2 class="page-title">数据积木</h2>
    <button id="add-card-btn">添加卡片</button>
  </div>

  <!-- Cards Grid -->
  <div id="cards-grid" class="grid grid-3"></div>

  <!-- Empty State -->
  <div id="empty-state" class="empty-state hidden">
    <div class="empty-state-icon">📊</div>
    <div class="empty-state-title">暂无数据卡片</div>
    <div class="empty-state-desc">点击"添加卡片"按钮添加第一个数据卡片</div>
  </div>
</div>

<script>
window.init_data_blocks = function() {
  // Render cards
  function renderCards() {
    const cards = dataBlocksManager.getCards();
    const cardsGrid = document.getElementById('cards-grid');
    const emptyState = document.getElementById('empty-state');

    if (cards.length === 0) {
      cardsGrid.innerHTML = '';
      emptyState.classList.remove('hidden');
      return;
    }

    emptyState.classList.add('hidden');
    cardsGrid.innerHTML = cards.map(card => {
      const cardType = dataBlocksManager.getCardTypes().find(t => t.id === card.type);
      return `
        <div class="data-card" data-card-id="${card.id}" draggable="true">
          <div class="data-card-header">
            <div class="data-card-title">${cardType.name}</div>
            <div class="data-card-actions">
              <button class="icon-btn refresh-card-btn" title="刷新">🔄</button>
              <button class="icon-btn delete-card-btn" title="删除">×</button>
            </div>
          </div>
          <div class="data-card-content" id="card-content-${card.id}">
            <div style="display: flex; align-items: center; justify-content: center; min-height: 200px;">
              <div class="spinner"></div>
            </div>
          </div>
          <div class="data-card-footer">
            最后更新: ${formatRelativeTime(card.lastUpdated)}
          </div>
        </div>
      `;
    }).join('');

    // Attach event listeners
    document.querySelectorAll('.data-card').forEach(cardEl => {
      const cardId = cardEl.dataset.cardId;

      cardEl.querySelector('.refresh-card-btn').onclick = () => {
        dataBlocksManager.refreshCard(cardId);
        renderCardContent(cardId);
      };

      cardEl.querySelector('.delete-card-btn').onclick = () => {
        confirm('确定要删除这个卡片吗？', () => {
          dataBlocksManager.removeCard(cardId);
          renderCards();
        });
      };

      // Drag and drop
      cardEl.ondragstart = (e) => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', cardId);
        cardEl.classList.add('dragging');
      };

      cardEl.ondragend = () => {
        cardEl.classList.remove('dragging');
      };

      cardEl.ondragover = (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      };

      cardEl.ondrop = (e) => {
        e.preventDefault();
        const draggedId = e.dataTransfer.getData('text/plain');
        const cards = dataBlocksManager.getCards();
        const draggedIndex = cards.findIndex(c => c.id === draggedId);
        const targetIndex = cards.findIndex(c => c.id === cardId);

        if (draggedIndex !== targetIndex) {
          dataBlocksManager.moveCard(draggedId, targetIndex);
          renderCards();
        }
      };
    });

    // Render card contents
    cards.forEach(card => renderCardContent(card.id));
  }

  // Render individual card content
  function renderCardContent(cardId) {
    const card = dataBlocksManager.getCards().find(c => c.id === cardId);
    if (!card) return;

    const contentEl = document.getElementById(`card-content-${cardId}`);
    const data = dataBlocksManager.getCardData(card);

    switch (card.type) {
      case 'account_tweet_stats':
        renderAccountTweetStats(contentEl, data);
        break;
      case 'latest_tweets':
        renderLatestTweets(contentEl, data);
        break;
      case 'account_basic_data':
        renderAccountBasicData(contentEl, data);
        break;
      case 'account_interaction_data':
        renderAccountInteractionData(contentEl, data);
        break;
      case 'tweet_time_distribution':
        renderTweetTimeDistribution(contentEl, data);
        break;
      case 'task_execution_stats':
        renderTaskExecutionStats(contentEl, data);
        break;
    }
  }

  function renderAccountTweetStats(el, data) {
    if (!data || data.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-state-title">暂无数据</div></div>';
      return;
    }

    el.innerHTML = data.map(account => `
      <div style="display: flex; align-items: center; gap: 12px; padding: 8px; border-bottom: 1px solid var(--color-border);">
        <img src="${account.avatar}" alt="${account.displayName}" style="width: 32px; height: 32px; border-radius: 50%;">
        <div style="flex: 1;">
          <div style="font-weight: 500;">${account.displayName}</div>
          <div style="font-size: 12px; color: var(--color-text-secondary);">${account.screenName}</div>
        </div>
        <div style="font-size: 24px; font-weight: 600; color: var(--color-primary);">${account.tweetCount.toLocaleString()}</div>
      </div>
    `).join('');
  }

  function renderLatestTweets(el, data) {
    if (!data || data.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-state-title">暂无推文</div></div>';
      return;
    }

    el.innerHTML = `
      <div class="tweet-list">
        ${data.map(tweet => `
          <div class="tweet-item">
            <div class="tweet-content">${tweet.content}</div>
            <div class="tweet-meta">
              <div class="tweet-stats">
                <span class="tweet-stat">👁️ ${(tweet.views / 1000).toFixed(1)}K</span>
                <span class="tweet-stat">❤️ ${(tweet.likes / 1000).toFixed(1)}K</span>
                <span class="tweet-stat">💬 ${tweet.replies}</span>
                <span class="tweet-stat">🔄 ${tweet.retweets}</span>
              </div>
              <div>${formatRelativeTime(tweet.publishTime)}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function renderAccountBasicData(el, data) {
    if (!data) {
      el.innerHTML = '<div class="empty-state"><div class="empty-state-title">暂无数据</div></div>';
      return;
    }

    el.innerHTML = `
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value">${data.following.toLocaleString()}</div>
          <div class="stat-label">关注数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${(data.followers / 1000000).toFixed(1)}M</div>
          <div class="stat-label">被关注数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${(data.blueFollowers / 1000).toFixed(1)}K</div>
          <div class="stat-label">蓝V关注数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${data.totalTweets.toLocaleString()}</div>
          <div class="stat-label">总推文数</div>
        </div>
      </div>
    `;
  }

  function renderAccountInteractionData(el, data) {
    if (!data) {
      el.innerHTML = '<div class="empty-state"><div class="empty-state-title">暂无数据</div></div>';
      return;
    }

    el.innerHTML = `
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value">${(data.totalViews / 1000000000).toFixed(1)}B</div>
          <div class="stat-label">总浏览量</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${(data.totalLikes / 1000000).toFixed(0)}M</div>
          <div class="stat-label">总点赞数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${(data.totalRetweets / 1000000).toFixed(0)}M</div>
          <div class="stat-label">总转推数</div>
        </div>
      </div>
    `;
  }

  function renderTweetTimeDistribution(el, data) {
    if (!data || data.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-state-title">暂无数据</div></div>';
      return;
    }

    const canvas = document.createElement('canvas');
    canvas.width = 400;
    canvas.height = 250;
    el.innerHTML = '';
    el.appendChild(canvas);

    const labels = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
    ChartRenderer.renderBarChart(canvas, data, labels);
  }

  function renderTaskExecutionStats(el, data) {
    if (!data) {
      el.innerHTML = '<div class="empty-state"><div class="empty-state-title">暂无数据</div></div>';
      return;
    }

    const canvas = document.createElement('canvas');
    canvas.width = 300;
    canvas.height = 300;
    el.innerHTML = '';
    el.appendChild(canvas);

    ChartRenderer.renderPieChart(canvas, data);
  }

  // Add card
  document.getElementById('add-card-btn').onclick = () => {
    const cardTypes = dataBlocksManager.getCardTypes();
    const content = document.createElement('div');
    content.innerHTML = `
      <p class="mb-md text-secondary">选择要添加的数据卡片类型：</p>
      <div class="grid grid-2" id="card-type-grid"></div>
    `;

    const modal = showModal(content, '添加数据卡片');
    const grid = content.querySelector('#card-type-grid');

    cardTypes.forEach(type => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.cursor = 'pointer';
      card.style.transition = 'all 0.15s ease';
      card.innerHTML = `
        <h4 class="mb-sm">${type.name}</h4>
        <p class="text-small text-secondary">${type.description}</p>
      `;

      card.onmouseover = () => {
        card.style.borderColor = 'var(--color-primary)';
        card.style.transform = 'translateY(-2px)';
      };

      card.onmouseout = () => {
        card.style.borderColor = 'var(--color-border)';
        card.style.transform = 'translateY(0)';
      };

      card.onclick = () => {
        modal.remove();
        dataBlocksManager.addCard(type.id);
        renderCards();
        showToast('卡片已添加', 'success');
      };

      grid.appendChild(card);
    });
  };

  // Listen for card changes
  window.addEventListener('cards-changed', renderCards);
  window.addEventListener('card-refreshed', (e) => {
    renderCardContent(e.detail.cardId);
  });

  // Initial render
  renderCards();
};
</script>

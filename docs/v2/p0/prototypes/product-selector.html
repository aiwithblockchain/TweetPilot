<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TweetPilot - 选择工作区</title>
  <link rel="stylesheet" href="styles/design-system.css">
  <style>
    /* 产品选择器专用样式 */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--spacing-4);
      background-color: var(--bg-secondary);
    }

    .selector-container {
      width: 100%;
      max-width: 800px;
    }

    /* 顶部标题栏 */
    .header {
      text-align: center;
      margin-bottom: var(--spacing-8);
    }

    .app-logo {
      font-size: 4rem;
      margin-bottom: var(--spacing-4);
    }

    .app-title {
      font-size: 2rem;
      font-weight: var(--font-bold);
      color: var(--text-primary);
      margin-bottom: var(--spacing-2);
    }

    .app-subtitle {
      font-size: var(--text-base);
      color: var(--text-secondary);
    }

    /* 操作按钮区 */
    .actions {
      display: flex;
      gap: var(--spacing-3);
      margin-bottom: var(--spacing-8);
    }

    .action-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-2);
      padding: var(--spacing-5);
      background-color: var(--bg-primary);
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .action-btn:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
    }

    .action-icon {
      font-size: 2rem;
    }

    .action-label {
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--text-primary);
    }

    /* 工作区列表标题 */
    .workspaces-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-4);
    }

    .workspaces-title {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
    }

    /* 搜索框 */
    .search-container {
      margin-bottom: var(--spacing-6);
    }

    /* 产品列表 */
    .products-list {
      display: grid;
      gap: var(--spacing-4);
    }

    /* 产品卡片 */
    .product-card {
      display: flex;
      align-items: flex-start;
      gap: var(--spacing-4);
      padding: var(--spacing-5);
      background-color: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .product-card:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .product-icon {
      font-size: 2rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .product-info {
      flex: 1;
      min-width: 0;
    }

    .product-name {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
      margin-bottom: var(--spacing-1);
    }

    .product-description {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-bottom: var(--spacing-2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .product-meta {
      display: flex;
      gap: var(--spacing-4);
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }

    .product-meta-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-1);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: var(--spacing-16) var(--spacing-4);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: var(--spacing-4);
      opacity: 0.3;
    }

    .empty-state-title {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
      margin-bottom: var(--spacing-2);
    }

    .empty-state-description {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    /* 创建产品对话框 */
    .dialog-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .dialog-overlay.active {
      display: flex;
    }

    .dialog {
      width: 90%;
      max-width: 500px;
      background-color: var(--bg-primary);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
    }

    .dialog-header {
      padding: var(--spacing-5);
      border-bottom: 1px solid var(--border);
    }

    .dialog-title {
      font-size: var(--text-xl);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
    }

    .dialog-body {
      padding: var(--spacing-6);
    }

    .form-group {
      margin-bottom: var(--spacing-5);
    }

    .form-label {
      display: block;
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--text-primary);
      margin-bottom: var(--spacing-2);
    }

    .form-label-required::after {
      content: ' *';
      color: var(--error);
    }

    .dialog-footer {
      padding: var(--spacing-5);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: var(--spacing-3);
    }

    /* 主题切换按钮 */
    .theme-toggle {
      position: fixed;
      bottom: var(--spacing-6);
      right: var(--spacing-6);
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.25rem;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-md);
    }

    .theme-toggle:hover {
      background-color: var(--bg-tertiary);
      box-shadow: var(--shadow-lg);
    }

    /* 加载状态 */
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.3);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .loading-overlay.active {
      display: flex;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>
<body>
  <!-- 加载状态 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <!-- 主容器 -->
  <div class="selector-container">
    <!-- 顶部标题栏 -->
    <div class="header">
      <div class="app-logo">🐦</div>
      <h1 class="app-title">TweetPilot</h1>
      <p class="app-subtitle">选择一个工作区以开始</p>
    </div>

    <!-- 操作按钮 -->
    <div class="actions">
      <div class="action-btn" id="openFolderBtn">
        <span class="action-icon">📁</span>
        <span class="action-label">打开工作区</span>
      </div>
      <div class="action-btn" id="createProductBtn">
        <span class="action-icon">➕</span>
        <span class="action-label">新建工作区</span>
      </div>
    </div>

    <!-- 工作区列表标题 -->
    <div class="workspaces-header">
      <h2 class="workspaces-title">最近使用的工作区</h2>
    </div>

    <!-- 搜索框 -->
    <div class="search-container">
      <input
        type="text"
        class="input input-search"
        placeholder="搜索工作区..."
        id="searchInput"
      >
    </div>

    <!-- 产品列表 -->
    <div class="products-list" id="productsList">
      <!-- 产品卡片将通过 JavaScript 动态生成 -->
    </div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-state-icon">📦</div>
      <div class="empty-state-title">暂无工作区</div>
      <div class="empty-state-description">点击"新建工作区"创建第一个产品工作区，或点击"打开工作区"选择已有目录</div>
    </div>
  </div>

  <!-- 创建产品对话框 -->
  <div class="dialog-overlay" id="createProductDialog">
    <div class="dialog">
      <div class="dialog-header">
        <h2 class="dialog-title">创建新工作区</h2>
      </div>
      <div class="dialog-body">
        <form id="createProductForm">
          <div class="form-group">
            <label class="form-label form-label-required" for="productName">工作区名称</label>
            <input
              type="text"
              class="input"
              id="productName"
              placeholder="例如：我的 SaaS 产品"
              required
            >
            <div class="form-help">每个工作区对应一个产品，拥有独立的数据库和配置</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="productDescription">产品描述</label>
            <input
              type="text"
              class="input"
              id="productDescription"
              placeholder="简短描述你的产品（可选）"
            >
          </div>
          <div class="form-group">
            <label class="form-label" for="productIcon">工作区图标</label>
            <input
              type="text"
              class="input"
              id="productIcon"
              placeholder="输入 emoji，例如：📦"
              maxlength="2"
            >
          </div>
          <div class="form-group">
            <label class="form-label form-label-required" for="twitterAccount">Twitter 账号</label>
            <select class="input" id="twitterAccount" required>
              <option value="">选择 Twitter 账号</option>
              <!-- 账号选项将通过 JavaScript 动态生成 -->
            </select>
            <div class="form-help">每个工作区绑定一个 Twitter 账号</div>
          </div>
        </form>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-secondary" id="cancelCreateBtn">取消</button>
        <button class="btn btn-primary" id="confirmCreateBtn">创建</button>
      </div>
    </div>
  </div>

  <!-- 主题切换按钮 -->
  <button class="theme-toggle" id="themeToggle" title="切换主题">
    <span id="themeIcon">🌙</span>
  </button>

  <!-- 引入 Mock 数据 -->
  <script src="scripts/mock-data.js"></script>

  <!-- 页面交互逻辑 -->
  <script>
    // ==================== 全局状态 ====================
    let currentProducts = [];
    let searchKeyword = '';

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      loadProducts();
      bindEvents();
    });

    // ==================== 主题切换 ====================
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      setTheme(savedTheme);
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      document.getElementById('themeIcon').textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    }

    // ==================== 加载产品列表 ====================
    async function loadProducts() {
      showLoading();

      // 模拟 API 延迟
      await MockData.delay(300);

      currentProducts = MockData.searchProducts(searchKeyword);
      renderProducts();

      hideLoading();
    }

    // ==================== 渲染产品列表 ====================
    function renderProducts() {
      const productsList = document.getElementById('productsList');
      const emptyState = document.getElementById('emptyState');

      if (currentProducts.length === 0) {
        productsList.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      productsList.style.display = 'grid';
      emptyState.style.display = 'none';

      productsList.innerHTML = currentProducts.map(product => {
        const account = MockData.getProductTwitterAccount(product.id);
        return `
          <div class="product-card" data-product-id="${product.id}">
            <div class="product-icon">${product.icon || '📦'}</div>
            <div class="product-info">
              <div class="product-name">${product.name}</div>
              ${product.description ? `<div class="product-description">${product.description}</div>` : ''}
              <div class="product-meta">
                <div class="product-meta-item">
                  <span>最后使用：${MockData.formatRelativeTime(product.lastUsedAt)}</span>
                </div>
                <div class="product-meta-item">
                  <span>Twitter 账号：@${account.username}</span>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      // 绑定产品卡片点击事件
      document.querySelectorAll('.product-card').forEach(card => {
        card.addEventListener('click', () => {
          const productId = card.getAttribute('data-product-id');
          selectProduct(productId);
        });
      });
    }

    // ==================== 选择产品 ====================
    async function selectProduct(productId) {
      showLoading();

      // 模拟 API 调用
      await MockData.delay(500);

      // 保存选中的产品 ID 和工作区路径
      const product = MockData.products.find(p => p.id === productId);
      localStorage.setItem('currentProductId', productId);
      localStorage.setItem('currentWorkspace', product.name);
      localStorage.setItem('workspaceInitialized', 'true');

      // 跳转到产品工作台
      window.location.href = 'workbench.html';
    }

    // ==================== 打开工作区文件夹 ====================
    function openFolder() {
      alert('打开工作区功能：\n\n在真实应用中，这里会打开文件选择对话框，让用户选择一个已有的工作区目录。\n\n每个工作区目录包含：\n- 独立的 SQLite 数据库\n- 产品配置文件\n- Twitter 账号绑定信息');
    }

    // ==================== 搜索产品 ====================
    let searchTimeout;
    function handleSearch(keyword) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchKeyword = keyword;
        loadProducts();
      }, 300); // 防抖 300ms
    }

    // ==================== 创建产品对话框 ====================
    function openCreateDialog() {
      const dialog = document.getElementById('createProductDialog');
      dialog.classList.add('active');

      // 填充 Twitter 账号选项
      const select = document.getElementById('twitterAccount');
      select.innerHTML = '<option value="">选择 Twitter 账号</option>' +
        Object.values(MockData.twitterAccounts).map(account =>
          `<option value="${account.id}">@${account.username} (${account.displayName})</option>`
        ).join('');

      // 重置表单
      document.getElementById('createProductForm').reset();
    }

    function closeCreateDialog() {
      const dialog = document.getElementById('createProductDialog');
      dialog.classList.remove('active');
    }

    async function createProduct() {
      const form = document.getElementById('createProductForm');

      // 表单验证
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const name = document.getElementById('productName').value;
      const description = document.getElementById('productDescription').value;
      const icon = document.getElementById('productIcon').value;
      const twitterAccountId = document.getElementById('twitterAccount').value;

      showLoading();
      closeCreateDialog();

      // 模拟 API 调用
      await MockData.delay(500);

      // 创建新产品
      const newProduct = {
        id: `product-${Date.now()}`,
        name,
        description,
        icon: icon || '📦',
        twitterAccountId,
        createdAt: new Date(),
        updatedAt: new Date(),
        lastUsedAt: new Date(),
      };

      MockData.products.push(newProduct);

      // 重新加载产品列表
      await loadProducts();

      hideLoading();

      // 自动选择新创建的产品
      selectProduct(newProduct.id);
    }

    // ==================== 加载状态 ====================
    function showLoading() {
      document.getElementById('loadingOverlay').classList.add('active');
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').classList.remove('active');
    }

    // ==================== 事件绑定 ====================
    function bindEvents() {
      // 搜索框
      document.getElementById('searchInput').addEventListener('input', (e) => {
        handleSearch(e.target.value);
      });

      // 创建产品按钮
      document.getElementById('createProductBtn').addEventListener('click', openCreateDialog);
      document.getElementById('openFolderBtn').addEventListener('click', openFolder);

      // 对话框按钮
      document.getElementById('cancelCreateBtn').addEventListener('click', closeCreateDialog);
      document.getElementById('confirmCreateBtn').addEventListener('click', createProduct);

      // 点击遮罩层关闭对话框
      document.getElementById('createProductDialog').addEventListener('click', (e) => {
        if (e.target.id === 'createProductDialog') {
          closeCreateDialog();
        }
      });

      // ESC 键关闭对话框
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeCreateDialog();
        }
      });

      // 主题切换
      document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    }
  </script>
</body>
</html>

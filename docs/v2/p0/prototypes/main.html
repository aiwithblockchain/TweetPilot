<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TweetPilot</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <div style="font-size: 24px;">🐦</div>
        <h1 style="font-size: 18px; font-weight: 600;">TweetPilot</h1>
      </div>
      <div class="header-center">
        <div class="workspace-path" id="workspace-path"></div>
      </div>
      <div class="header-right">
        <button class="secondary small" id="open-workspace-btn">打开工作目录</button>
        <button class="secondary small" id="settings-btn">设置</button>
      </div>
    </header>

    <!-- Main Content -->
    <div class="app-main">
      <!-- Sidebar -->
      <aside class="app-sidebar">
        <nav class="sidebar-nav">
          <a href="#task-management" class="nav-item active" data-page="task-management">
            <span>📋</span>
            <span>任务管理</span>
          </a>
          <a href="#data-blocks" class="nav-item" data-page="data-blocks">
            <span>📊</span>
            <span>数据积木</span>
          </a>
          <a href="#settings" class="nav-item" data-page="settings">
            <span>⚙️</span>
            <span>设置</span>
          </a>
        </nav>
      </aside>

      <!-- Content Area -->
      <main class="app-content" id="app-content">
        <!-- Content will be loaded here -->
      </main>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/workspace.js"></script>
  <script src="js/account.js"></script>
  <script src="js/task.js"></script>
  <script src="js/data-blocks.js"></script>
  <script>
    // Check if workspace is selected
    if (!workspaceManager.getCurrentWorkspace()) {
      window.location.href = 'index.html';
    }

    // Display workspace path
    const workspacePath = workspaceManager.getCurrentWorkspace();
    document.getElementById('workspace-path').textContent = workspacePath;

    // Open new workspace
    document.getElementById('open-workspace-btn').addEventListener('click', () => {
      // Show workspace selection dialog (same as index.html)
      const content = document.createElement('div');
      content.innerHTML = `
        <div style="display: flex; flex-direction: column; gap: 16px;">
          <div class="card" style="cursor: pointer; padding: 24px;" id="select-local-dir">
            <h3 style="margin-bottom: 8px;">📁 选择本地目录</h3>
            <p class="text-secondary text-small">选择一个已有的项目目录</p>
          </div>
          <div class="card" style="cursor: pointer; padding: 24px;" id="clone-from-github">
            <h3 style="margin-bottom: 8px;">🔗 从 GitHub 克隆</h3>
            <p class="text-secondary text-small">输入 GitHub 仓库 URL</p>
          </div>
        </div>
      `;

      const modal = showModal(content, '打开工作目录');

      // Select local directory
      content.querySelector('#select-local-dir').onclick = () => {
        modal.remove();
        const pathInput = prompt('请输入工作目录路径：', '/Users/user/projects/my-project');
        if (pathInput) {
          workspaceManager.openNewInstance(pathInput);
        }
      };

      // Clone from GitHub
      content.querySelector('#clone-from-github').onclick = () => {
        modal.remove();
        const repoUrl = prompt('请输入 GitHub 仓库 URL：', 'https://github.com/user/repo');
        if (repoUrl) {
          workspaceManager.cloneFromGitHub(repoUrl);
        }
      };

      // Add hover effects
      content.querySelectorAll('.card').forEach(card => {
        card.onmouseover = () => {
          card.style.borderColor = 'var(--color-primary)';
          card.style.transform = 'translateY(-2px)';
        };
        card.onmouseout = () => {
          card.style.borderColor = 'var(--color-border)';
          card.style.transform = 'translateY(0)';
        };
      });
    });

    // Settings button
    document.getElementById('settings-btn').addEventListener('click', () => {
      loadPage('settings');
      updateActiveNav('settings');
    });

    // Navigation
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        const page = item.dataset.page;
        loadPage(page);
        updateActiveNav(page);
      });
    });

    function updateActiveNav(page) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        if (item.dataset.page === page) {
          item.classList.add('active');
        }
      });
    }

    async function loadPage(page) {
      const content = document.getElementById('app-content');

      try {
        const response = await fetch(`pages/${page}.html`);
        if (response.ok) {
          const html = await response.text();

          // Create a temporary container to parse HTML
          const temp = document.createElement('div');
          temp.innerHTML = html;

          // Extract and execute scripts
          const scripts = temp.querySelectorAll('script');
          const scriptTexts = [];
          scripts.forEach(script => {
            scriptTexts.push(script.textContent);
            script.remove(); // Remove script tags from HTML
          });

          // Set the HTML content (without scripts)
          content.innerHTML = temp.innerHTML;

          // Execute scripts
          scriptTexts.forEach(scriptText => {
            const scriptEl = document.createElement('script');
            scriptEl.textContent = scriptText;
            document.body.appendChild(scriptEl);
            document.body.removeChild(scriptEl);
          });

          // Initialize page-specific scripts
          const initFuncName = `init_${page.replace(/-/g, '_')}`;
          if (window[initFuncName]) {
            window[initFuncName]();
          }
        } else {
          content.innerHTML = '<div class="empty-state"><div class="empty-state-title">页面加载失败</div></div>';
        }
      } catch (error) {
        console.error('Page load error:', error);
        content.innerHTML = '<div class="empty-state"><div class="empty-state-title">页面加载失败</div></div>';
      }
    }

    // Load initial page
    const hash = window.location.hash.slice(1) || 'task-management';
    loadPage(hash);
    updateActiveNav(hash);

    // Handle hash changes
    window.addEventListener('hashchange', () => {
      const page = window.location.hash.slice(1) || 'task-management';
      loadPage(page);
      updateActiveNav(page);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TweetPilot - 数据积木</title>
  <link rel="stylesheet" href="styles/design-system.css">
  <style>
    body {
      margin: 0;
      background-color: var(--bg-primary);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--spacing-8);
    }

    /* 顶部操作栏 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-6);
    }

    .header-left h1 {
      font-size: var(--text-2xl);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
      margin-bottom: var(--spacing-1);
    }

    .header-left p {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin: 0;
    }

    .workspace-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-2);
      margin-top: var(--spacing-3);
      padding: var(--spacing-2) var(--spacing-3);
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      background-color: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: var(--text-xs);
      font-family: var(--font-mono);
    }

    .header-right {
      display: flex;
      gap: var(--spacing-3);
    }

    /* 数据积木卡片 */
    .data-blocks {
      display: grid;
      gap: var(--spacing-6);
    }

    .data-block {
      background-color: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--spacing-5);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background-color var(--transition-fast);
    }

    .block-header:hover {
      background-color: var(--bg-secondary);
    }

    .block-header-left {
      display: flex;
      align-items: center;
      gap: var(--spacing-3);
    }

    .block-icon {
      font-size: 1.5rem;
    }

    .block-title {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
    }

    .block-count {
      font-size: var(--text-sm);
      color: var(--text-tertiary);
      margin-left: var(--spacing-2);
    }

    .block-toggle {
      font-size: var(--text-sm);
      color: var(--text-tertiary);
      transition: transform var(--transition-fast);
    }

    .block-toggle.expanded {
      transform: rotate(180deg);
    }

    .block-body {
      display: none;
      padding: var(--spacing-5);
    }

    .block-body.expanded {
      display: block;
    }

    /* 数据项列表 */
    .data-list {
      display: grid;
      gap: var(--spacing-3);
    }

    .data-item {
      display: flex;
      gap: var(--spacing-4);
      padding: var(--spacing-4);
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .data-item:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .data-item-content {
      flex: 1;
      min-width: 0;
    }

    .data-item-text {
      font-size: var(--text-sm);
      color: var(--text-primary);
      margin-bottom: var(--spacing-2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .data-item-meta {
      display: flex;
      gap: var(--spacing-4);
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }

    .data-item-actions {
      display: flex;
      gap: var(--spacing-2);
      flex-shrink: 0;
    }

    /* 用户画像卡片 */
    .user-profile-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-4);
      padding: var(--spacing-4);
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .user-profile-item:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      background-color: var(--bg-tertiary);
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }

    .user-info {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: var(--text-base);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
      margin-bottom: var(--spacing-1);
    }

    .user-username {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-bottom: var(--spacing-2);
    }

    .user-stats {
      display: flex;
      gap: var(--spacing-4);
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }

    .empty-card {
      padding: var(--spacing-5);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      background-color: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: var(--text-sm);
      line-height: var(--leading-relaxed);
      text-align: center;
    }

    /* 详情弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      width: 90%;
      max-width: 700px;
      max-height: 90vh;
      background-color: var(--bg-primary);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      padding: var(--spacing-5);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: var(--text-xl);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
    }

    .close-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: transparent;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
    }

    .close-btn:hover {
      background-color: var(--bg-secondary);
      color: var(--text-primary);
    }

    .modal-body {
      padding: var(--spacing-6);
      overflow-y: auto;
    }

    .detail-section {
      margin-bottom: var(--spacing-6);
    }

    .detail-section:last-child {
      margin-bottom: 0;
    }

    .detail-section-title {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--spacing-3);
    }

    .detail-text {
      font-size: var(--text-base);
      color: var(--text-primary);
      line-height: var(--leading-relaxed);
      margin-bottom: var(--spacing-4);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--spacing-4);
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-1);
    }

    .detail-label {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .detail-value {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--text-primary);
    }

    .modal-footer {
      padding: var(--spacing-5);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: var(--spacing-3);
    }

    /* 主题切换 */
    .theme-toggle {
      position: fixed;
      bottom: var(--spacing-6);
      right: var(--spacing-6);
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.25rem;
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-md);
      z-index: 100;
    }

    .theme-toggle:hover {
      background-color: var(--bg-tertiary);
      box-shadow: var(--shadow-lg);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部操作栏 -->
    <div class="header">
      <div class="header-left">
        <h1>数据积木</h1>
        <p>展示半成品数据（高互动推文、评论、用户画像）</p>
        <div class="workspace-badge" id="workspaceBadge">工作区加载中...</div>
      </div>
      <div class="header-right">
        <button class="btn btn-secondary" id="exportBtn">导出</button>
        <button class="btn btn-primary" id="refreshBtn">
          <span class="spinner" id="refreshSpinner" style="display: none;"></span>
          <span id="refreshText">刷新</span>
        </button>
      </div>
    </div>

    <!-- 数据积木列表 -->
    <div class="data-blocks">
      <!-- 高互动推文 -->
      <div class="data-block">
        <div class="block-header" data-block="tweets">
          <div class="block-header-left">
            <span class="block-icon">📊</span>
            <span class="block-title">高互动推文列表</span>
            <span class="block-count" id="tweetsCount">(10)</span>
          </div>
          <span class="block-toggle expanded">▼</span>
        </div>
        <div class="block-body expanded" id="tweetsBody">
          <div class="data-list" id="tweetsList">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>

      <!-- 高互动评论 -->
      <div class="data-block">
        <div class="block-header" data-block="comments">
          <div class="block-header-left">
            <span class="block-icon">💬</span>
            <span class="block-title">高互动评论列表</span>
            <span class="block-count" id="commentsCount">(10)</span>
          </div>
          <span class="block-toggle expanded">▼</span>
        </div>
        <div class="block-body expanded" id="commentsBody">
          <div class="data-list" id="commentsList">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>

      <!-- 活跃用户画像 -->
      <div class="data-block">
        <div class="block-header" data-block="users">
          <div class="block-header-left">
            <span class="block-icon">👥</span>
            <span class="block-title">活跃用户画像</span>
            <span class="block-count" id="usersCount">(10)</span>
          </div>
          <span class="block-toggle expanded">▼</span>
        </div>
        <div class="block-body expanded" id="usersBody">
          <div class="data-list" id="usersList">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">详情</h2>
        <button class="close-btn" id="closeModalBtn">✕</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- 动态生成 -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="closeModalFooterBtn">关闭</button>
        <button class="btn btn-primary" id="viewOnTwitterBtn">在 Twitter 查看</button>
      </div>
    </div>
  </div>

  <!-- 主题切换 -->
  <button class="theme-toggle" id="themeToggle">
    <span id="themeIcon">🌙</span>
  </button>

  <script src="scripts/mock-data.js"></script>
  <script>
    // ==================== 全局状态 ====================
    let currentData = {
      tweets: [],
      comments: [],
      users: [],
    };
    let currentWorkspacePath = null;
    let currentWorkspace = null;
    let currentDetail = null;

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', () => {
      initTheme();
      ensureWorkspaceContext();
      loadData();
      bindEvents();
    });

    // ==================== 主题切换 ====================
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      setTheme(savedTheme);
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      document.getElementById('themeIcon').textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    }

    function ensureWorkspaceContext() {
      currentWorkspacePath = localStorage.getItem('currentWorkspacePath');
      const workspaceInitialized = localStorage.getItem('workspaceInitialized');

      if (!workspaceInitialized || !currentWorkspacePath) {
        alert('请先选择一个工作区');
        window.location.href = 'product-selector.html';
        return;
      }

      currentWorkspace = MockData.getWorkspaceByPath(currentWorkspacePath);
      if (!currentWorkspace) {
        alert('当前工作区不存在，请重新选择');
        window.location.href = 'product-selector.html';
        return;
      }

      document.getElementById('workspaceBadge').textContent = MockData.compactPath(currentWorkspace.rootPath);
    }

    // ==================== 加载数据 ====================
    async function loadData() {
      await MockData.delay(300);

      currentData.tweets = MockData.getTweetsByWorkspacePath(currentWorkspacePath);
      currentData.comments = MockData.getCommentsByWorkspacePath(currentWorkspacePath);
      currentData.users = MockData.getUserProfilesByWorkspacePath(currentWorkspacePath);

      renderTweets();
      renderComments();
      renderUsers();
    }

    function renderEmptyCard(message) {
      return `<div class="empty-card">${message}</div>`;
    }

    // ==================== 渲染推文列表 ====================
    function renderTweets() {
      const list = document.getElementById('tweetsList');
      const count = document.getElementById('tweetsCount');

      count.textContent = `(${currentData.tweets.length})`;

      if (currentData.tweets.length === 0) {
        list.innerHTML = renderEmptyCard('当前工作区还没有沉淀出高互动推文。请先绑定账号并完成一次数据采集。');
        return;
      }

      list.innerHTML = currentData.tweets.map(tweet => `
        <div class="data-item" data-type="tweet" data-id="${tweet.id}">
          <div class="data-item-content">
            <div class="data-item-text">${tweet.content}</div>
            <div class="data-item-meta">
              <span>❤️ ${tweet.likes}</span>
              <span>🔄 ${tweet.retweets}</span>
              <span>💬 ${tweet.replies}</span>
              <span>${MockData.formatRelativeTime(tweet.createdAt)}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ==================== 渲染评论列表 ====================
    function renderComments() {
      const list = document.getElementById('commentsList');
      const count = document.getElementById('commentsCount');

      count.textContent = `(${currentData.comments.length})`;

      if (currentData.comments.length === 0) {
        list.innerHTML = renderEmptyCard('当前工作区还没有可用评论样本。评论会随着推文采集结果自动出现。');
        return;
      }

      const sentimentEmoji = {
        positive: '😊',
        neutral: '😐',
        negative: '😞',
      };

      const sentimentLabels = {
        positive: '正面',
        neutral: '中性',
        negative: '负面',
      };

      list.innerHTML = currentData.comments.map(comment => `
        <div class="data-item" data-type="comment" data-id="${comment.id}">
          <div class="data-item-content">
            <div class="data-item-text">${comment.content}</div>
            <div class="data-item-meta">
              <span>${sentimentEmoji[comment.sentiment]} ${sentimentLabels[comment.sentiment]}</span>
              <span>❤️ ${comment.likes}</span>
              <span>${MockData.formatRelativeTime(comment.createdAt)}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ==================== 渲染用户列表 ====================
    function renderUsers() {
      const list = document.getElementById('usersList');
      const count = document.getElementById('usersCount');

      count.textContent = `(${currentData.users.length})`;

      if (currentData.users.length === 0) {
        list.innerHTML = renderEmptyCard('当前工作区还没有生成活跃用户画像。先收集评论数据，再进行画像聚合。');
        return;
      }

      list.innerHTML = currentData.users.map(user => `
        <div class="user-profile-item" data-type="user" data-id="${user.id}">
          <div class="user-avatar">${user.avatar}</div>
          <div class="user-info">
            <div class="user-name">${user.displayName}</div>
            <div class="user-username">@${user.username}</div>
            <div class="user-stats">
              <span>关注 ${MockData.formatNumber(user.followingCount)}</span>
              <span>粉丝 ${MockData.formatNumber(user.followersCount)}</span>
              <span>互动频率 ${user.interactionFrequency}/周</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ==================== 展开/折叠数据块 ====================
    function toggleBlock(blockName) {
      const body = document.getElementById(`${blockName}Body`);
      const toggle = document.querySelector(`[data-block="${blockName}"] .block-toggle`);

      if (body.classList.contains('expanded')) {
        body.classList.remove('expanded');
        toggle.classList.remove('expanded');
      } else {
        body.classList.add('expanded');
        toggle.classList.add('expanded');
      }
    }

    // ==================== 显示详情弹窗 ====================
    function showDetail(type, id) {
      const modal = document.getElementById('detailModal');
      const title = document.getElementById('modalTitle');
      const body = document.getElementById('modalBody');
      const viewBtn = document.getElementById('viewOnTwitterBtn');

      let item;
      if (type === 'tweet') {
        item = currentData.tweets.find(t => t.id === id);
        if (!item) return;
        currentDetail = {
          type,
          url: `https://x.com/${item.author.replace(/^@/, '')}/status/${item.id.replace('tweet-', '1000')}`,
        };
        title.textContent = '推文详情';
        body.innerHTML = `
          <div class="detail-section">
            <div class="detail-section-title">推文内容</div>
            <div class="detail-text">${item.content}</div>
          </div>
          <div class="detail-section">
            <div class="detail-section-title">互动数据</div>
            <div class="detail-grid">
              <div class="detail-item">
                <span class="detail-label">点赞数</span>
                <span class="detail-value">${MockData.formatNumber(item.likes)}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">转发数</span>
                <span class="detail-value">${MockData.formatNumber(item.retweets)}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">回复数</span>
                <span class="detail-value">${MockData.formatNumber(item.replies)}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">发布时间</span>
                <span class="detail-value">${MockData.formatRelativeTime(item.createdAt)}</span>
              </div>
            </div>
          </div>
        `;
      } else if (type === 'comment') {
        item = currentData.comments.find(c => c.id === id);
        if (!item) return;
        currentDetail = {
          type,
          url: `https://x.com/i/web/status/${item.tweetId.replace('tweet-', '1000')}`,
        };
        const sentimentLabels = { positive: '正面', neutral: '中性', negative: '负面' };
        title.textContent = '评论详情';
        body.innerHTML = `
          <div class="detail-section">
            <div class="detail-section-title">评论内容</div>
            <div class="detail-text">${item.content}</div>
          </div>
          <div class="detail-section">
            <div class="detail-section-title">评论信息</div>
            <div class="detail-grid">
              <div class="detail-item">
                <span class="detail-label">作者</span>
                <span class="detail-value">${item.author}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">情感</span>
                <span class="detail-value">${sentimentLabels[item.sentiment]}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">点赞数</span>
                <span class="detail-value">${MockData.formatNumber(item.likes)}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">发布时间</span>
                <span class="detail-value">${MockData.formatRelativeTime(item.createdAt)}</span>
              </div>
            </div>
          </div>
        `;
      } else if (type === 'user') {
        item = currentData.users.find(u => u.id === id);
        if (!item) return;
        currentDetail = {
          type,
          url: `https://x.com/${item.username}`,
        };
        title.textContent = '用户画像';
        body.innerHTML = `
          <div class="detail-section">
            <div class="detail-section-title">用户信息</div>
            <div class="detail-grid">
              <div class="detail-item">
                <span class="detail-label">用户名</span>
                <span class="detail-value">@${item.username}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">显示名称</span>
                <span class="detail-value">${item.displayName}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">关注数</span>
                <span class="detail-value">${MockData.formatNumber(item.followingCount)}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">粉丝数</span>
                <span class="detail-value">${MockData.formatNumber(item.followersCount)}</span>
              </div>
              <div class="detail-item">
                <span class="detail-label">互动频率</span>
                <span class="detail-value">${item.interactionFrequency} 次/周</span>
              </div>
            </div>
          </div>
        `;
      }

      viewBtn.disabled = !currentDetail?.url;
      modal.classList.add('active');
    }

    function closeModal() {
      currentDetail = null;
      document.getElementById('detailModal').classList.remove('active');
    }

    // ==================== 刷新数据 ====================
    async function refreshData() {
      const btn = document.getElementById('refreshBtn');
      const spinner = document.getElementById('refreshSpinner');
      const text = document.getElementById('refreshText');

      btn.disabled = true;
      spinner.style.display = 'inline-block';
      text.textContent = '刷新中...';

      await MockData.delay(1000);

      await loadData();

      btn.disabled = false;
      spinner.style.display = 'none';
      text.textContent = '刷新';
    }

    // ==================== 导出数据 ====================
    function exportData() {
      const data = {
        workspacePath: currentWorkspacePath,
        tweets: currentData.tweets,
        comments: currentData.comments,
        users: currentData.users,
        exportedAt: new Date().toISOString(),
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `tweetpilot-data-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function openCurrentDetailLink() {
      if (!currentDetail?.url) return;
      window.open(currentDetail.url, '_blank', 'noopener,noreferrer');
      closeModal();
    }

    // ==================== 事件绑定 ====================
    function bindEvents() {
      // 数据块展开/折叠
      document.querySelectorAll('.block-header').forEach(header => {
        header.addEventListener('click', () => {
          const blockName = header.getAttribute('data-block');
          toggleBlock(blockName);
        });
      });

      // 数据项点击
      document.addEventListener('click', (e) => {
        const item = e.target.closest('[data-type]');
        if (item) {
          const type = item.getAttribute('data-type');
          const id = item.getAttribute('data-id');
          showDetail(type, id);
        }
      });

      // 弹窗关闭
      document.getElementById('closeModalBtn').addEventListener('click', closeModal);
      document.getElementById('closeModalFooterBtn').addEventListener('click', closeModal);
      document.getElementById('detailModal').addEventListener('click', (e) => {
        if (e.target.id === 'detailModal') {
          closeModal();
        }
      });

      // 在 Twitter 查看
      document.getElementById('viewOnTwitterBtn').addEventListener('click', openCurrentDetailLink);

      // 刷新和导出
      document.getElementById('refreshBtn').addEventListener('click', refreshData);
      document.getElementById('exportBtn').addEventListener('click', exportData);

      // ESC 键
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeModal();
        }
      });

      // 主题切换
      document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    }
  </script>
</body>
</html>
